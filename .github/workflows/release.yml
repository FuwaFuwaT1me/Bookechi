name: 🚀 Auto Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  create-release:
    name: Create Release with Changelog
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: 🏷️ Get version from tag
        id: get_version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
      
      - name: 📝 Generate Changelog
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          
          if [ -z "$PREV_TAG" ]; then
            CHANGELOG=$(git log --pretty=format:"- %s (%h)" --no-merges -20)
          else
            CHANGELOG=$(git log ${PREV_TAG}..HEAD --pretty=format:"- %s (%h)" --no-merges)
          fi
          
          VERSION=${{ steps.get_version.outputs.VERSION }}
          
          echo "## 🚀 What's New in ${VERSION}" > release_notes.md
          echo "" >> release_notes.md
          
          # Features
          FEATURES=$(echo "$CHANGELOG" | grep -iE "^- (feat|add|new)" || true)
          if [ -n "$FEATURES" ]; then
            echo "### ✨ New Features" >> release_notes.md
            echo "$FEATURES" >> release_notes.md
            echo "" >> release_notes.md
          fi
          
          # Bug fixes
          FIXES=$(echo "$CHANGELOG" | grep -iE "^- (fix|bug|patch)" || true)
          if [ -n "$FIXES" ]; then
            echo "### 🐛 Bug Fixes" >> release_notes.md
            echo "$FIXES" >> release_notes.md
            echo "" >> release_notes.md
          fi
          
          # Other changes
          OTHER=$(echo "$CHANGELOG" | grep -viE "^- (feat|add|new|fix|bug|patch)" || true)
          if [ -n "$OTHER" ]; then
            echo "### 📦 Other Changes" >> release_notes.md
            echo "$OTHER" >> release_notes.md
          fi
          
          echo "" >> release_notes.md
          echo "---" >> release_notes.md
          echo "" >> release_notes.md
          echo "📱 **APK:** Скачайте APK из Assets ниже или соберите локально:" >> release_notes.md
          echo "\`\`\`bash" >> release_notes.md
          echo "./gradlew assembleDebug" >> release_notes.md
          echo "\`\`\`" >> release_notes.md
          echo "" >> release_notes.md
          echo "_Built automatically by GitHub Actions_ 🤖" >> release_notes.md
          
          echo "=== Generated Release Notes ==="
          cat release_notes.md
      
      - name: 🎉 Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          name: "📚 Bookechi ${{ steps.get_version.outputs.VERSION }}"
          body_path: release_notes.md
          draft: false
          prerelease: ${{ contains(steps.get_version.outputs.VERSION, 'alpha') || contains(steps.get_version.outputs.VERSION, 'beta') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
